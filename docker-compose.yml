services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5431:5432"]
    volumes: [pg_auth:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10

  postgres-activities:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: activities_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [pg_activities:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10

  postgres-profiles:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: profiles_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    volumes: [pg_profiles:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic activities &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic users &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic news &&
        echo Topics created
      "

  gateway:
    build:
      context: backend
      dockerfile: gateway/Dockerfile
    ports: ["8080:8080"]
    environment:
      LISTEN_ADDR: ":8080"
      JWT_SECRET: "${JWT_SECRET:-changeme}"
      VIEWS_ADDR: "http://views:8083"
      AUTH_ADDR: "http://auth:8081"
    depends_on: [views, auth]

  auth:
    build:
      context: backend
      dockerfile: services/auth/Dockerfile
    ports: ["8081:8081"]
    environment:
      LISTEN_ADDR: ":8081"
      DB_DSN: "postgres://postgres:postgres@postgres-auth:5432/auth_db?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-changeme}"
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy

  activities:
    build:
      context: backend
      dockerfile: services/activities/Dockerfile
    ports: ["8082:8082"]
    environment:
      LISTEN_ADDR: ":8082"
      DB_DSN: "postgres://postgres:postgres@postgres-activities:5432/activities_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      postgres-activities:
        condition: service_healthy
      kafka:
        condition: service_healthy

  views:
    build:
      context: backend
      dockerfile: services/views/Dockerfile
    ports: ["8083:8083"]
    environment:
      LISTEN_ADDR: ":8083"
      ACTIVITIES_ADDR: "http://activities:8082"
      USER_PROFILES_ADDR: "http://user-profiles:8084"
      NEWS_FEED_ADDR: "http://news-feed:8085"
      ACTIVITY_OPS_ADDR: "http://activity-ops:8086"
      MAP_ACTIVITIES_ADDR: "http://map-activities:8087"
      USER_INFO_ADDR: "http://user-info:8088"
    depends_on: [activities, user-profiles, news-feed, activity-ops, map-activities, user-info]

  user-profiles:
    build:
      context: backend
      dockerfile: services/user-profiles/Dockerfile
    ports: ["8084:8084"]
    environment:
      LISTEN_ADDR: ":8084"
      DB_DSN: "postgres://postgres:postgres@postgres-profiles:5432/profiles_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      AVATAR_DIR: "/data/avatars"
      BASE_URL: "http://user-profiles:8084"
    volumes: [avatars:/data/avatars]
    depends_on:
      postgres-profiles:
        condition: service_healthy
      kafka:
        condition: service_healthy

  news-feed:
    build:
      context: backend
      dockerfile: services/news-feed/Dockerfile
    ports: ["8085:8085"]
    environment:
      LISTEN_ADDR: ":8085"
      MONGO_URI: "mongodb://mongodb:27017"
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  activity-ops:
    build:
      context: backend
      dockerfile: services/activity-ops/Dockerfile
    ports: ["8086:8086"]
    environment:
      LISTEN_ADDR: ":8086"
      ACTIVITIES_ADDR: "http://activities:8082"
    depends_on: [activities]

  map-activities:
    build:
      context: backend
      dockerfile: services/map-activities/Dockerfile
    ports: ["8087:8087"]
    environment:
      LISTEN_ADDR: ":8087"
      MONGO_URI: "mongodb://mongodb:27017"
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-info:
    build:
      context: backend
      dockerfile: services/user-info/Dockerfile
    ports: ["8088:8088"]
    environment:
      LISTEN_ADDR: ":8088"
      MONGO_URI: "mongodb://mongodb:27017"
      KAFKA_BROKERS: "kafka:9092"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  news-collector:
    build:
      context: backend
      dockerfile: services/news-collector/Dockerfile
    environment:
      KAFKA_BROKERS: "kafka:9092"
      NEWS_API_URL: "https://newsapi.org/v2/top-headlines"
      NEWS_API_KEY: "${NEWS_API_KEY:-}"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  pg_auth:
  pg_activities:
  pg_profiles:
  mongo_data:
  avatars:
